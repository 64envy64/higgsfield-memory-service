name: CI

# Reproducibility proof: the same docker compose flow from §8 of the task spec,
# executed on a clean ubuntu-latest runner on every push and pull request.
# If this badge is green, the spec's "Setup We'll Use"
# block boots cleanly from a fresh clone.

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  contract-and-quality:
    name: Contract + quality tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker / Compose versions
        run: |
          docker --version
          docker compose version

      - name: Build & start the stack
        run: docker compose up -d --build

      - name: Wait for /health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/health > /dev/null; then
              echo "service healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::service did not become healthy in 60s"
          docker compose logs --no-color api
          exit 1

      - name: Run pytest (contract + quality) inside the api container
        run: docker compose exec -T api python -m pytest tests/ -q

      - name: Spec smoke (§8 of the task)
        run: bash scripts/smoke.sh

      - name: Show api logs on failure
        if: failure()
        run: docker compose logs --no-color api

      - name: Teardown
        if: always()
        # -v removes the named volume; we want each CI run to start from
        # an empty store so persistence regressions surface as failures
        # rather than as "I happened to inherit state from last run".
        run: docker compose down -v

  persistence:
    name: Persistence across restart
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image (so the script's `docker compose up` doesn't pull-fail on a fresh runner)
        run: docker compose build

      - name: Run scripts/test_persistence.sh
        run: bash scripts/test_persistence.sh

      - name: Show api logs on failure
        if: failure()
        run: docker compose logs --no-color api

      - name: Teardown
        if: always()
        run: docker compose down -v
